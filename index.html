<script>
    // 在這裡維護您的據點，新增分店時只需在此處添加一行
    const sites = [
        { name: "花蓮營業處 (即期品)", file: "LMT-HL.html", color: "bg-blue-600" },
        { name: "台東營業處 (即期品)", file: "LMT-TD.html", color: "bg-orange-600" }, // 這裡要加逗號
        { name: "Q2教育訓練", file: "Training-Q2.html", color: "bg-green-600" },     // 這裡要加逗號
        { name: "Q3教育訓練", file: "Training-Q3.html", color: "bg-purple-600" }     // 最後一項不用加
    ];

    const listContainer = document.getElementById('site-list');
    
    sites.forEach(site => {
        listContainer.innerHTML += `
            <a href="${site.file}" class="${site.color} text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition flex justify-between items-center transform hover:scale-[1.02]">
                <span class="text-xl font-bold">${site.name}</span>
                <span class="bg-white/20 px-4 py-2 rounded-lg font-bold">進入查看 →</span>
            </a>
        `;
    });
</script>
